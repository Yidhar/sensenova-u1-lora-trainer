# Train a style LoRA on top of the official 8-step distill LoRA.
#
# At training time we bake-in the official 8-step delta into the bf16 base
# (skipping fm_head to avoid clobbering our own fm_head LoRA), then wrap our
# LoRA on top. Sample with --num-steps 8 --cfg-scale 1.0 --timestep-shift 3.0.

run_name: my_style_8step

data:
  data_dir: dataset/my_style
  cap_max_pixels: 4194304
  snap_bucket: true

style:
  trigger: "my style"
  prompt_template: official

lora:
  preset: default                  # attn+mlp+fm_head all at r=64

unfreeze: []

train:
  steps: 4000                      # 8-step base is already calibrated; less data fits faster
  lr: 5.0e-5
  seed: 0
  shuffle: true
  grad_accum: 1
  checkpoint_every: 500

runtime:
  keep_kvs_on_gpu: true
  gc_skip_last: 6
  device: cuda
  cpu_device: cpu
  upstream_lora_path: hf_cache/models--sensenova--SenseNova-U1-8B-MoT-LoRAs/snapshots/565803f75855a5f3fb2212d109a5c8fa018cde4d/SenseNova-U1-8B-MoT-LoRA-8step-V1.0.safetensors
  upstream_lora_skip:
    - fm_modules.fm_head            # keep our fm_head LoRA's surface clean
